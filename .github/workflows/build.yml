name: Build Quizzard (Windows & Android)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          cache: true
      
      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: Build Installer (No Signing)
        run: |
          dart run inno_bundle --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quizzard-windows-installer
          path: build/windows/x64/installer/Release/*.exe

  # --- ANDROID BUILD ---
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          cache: true

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quizzard-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

# --- RELEASE JOB ---
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-android] 
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: quizzard-windows-installer

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: quizzard-android-apk

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.exe
            *.apk
          tag_name: ${{ github.ref_name }}         
          name: "Quizzard Release ${{ github.ref_name }}" 
          body: "Automated Release: Windows Installer and Android APK included."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}